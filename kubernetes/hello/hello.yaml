# =============================================================================
# hello: smoke-test workload for the k3s cluster
# =============================================================================
# traefik/whoami is a tiny Go server that echoes the incoming HTTP request
# (headers, source IP, hostname, forwarded-for). Useful for proving the
# entire request path works and for debugging proxy setups.
#
# Exposed via NodePort 30080 on every k3s node; nginx on lab-gateway
# load-balances across all nodes at services/nginx/conf.d/hello.conf.
# =============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello
  labels:
    app: hello
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:v1.10
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: hello
  labels:
    app: hello
spec:
  type: NodePort
  selector:
    app: hello
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30080
