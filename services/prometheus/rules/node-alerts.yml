# =============================================================================
# node_exporter alert rules
# =============================================================================
# Loaded by Prometheus via the rule_files glob in prometheus.yml.
# Reload Prometheus after editing: docker exec prometheus kill -HUP 1
#
# Severity convention: warning = "look at this when convenient",
# critical = "look at this now". Pages or paged-style notifications can be
# wired into Alertmanager routes later by severity.
# =============================================================================

groups:
  - name: node-host
    interval: 30s
    rules:

      - alert: InstanceDown
        expr: up{job="node"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: '{{ $labels.host }} is unreachable'
          description: 'node_exporter on {{ $labels.host }} has been down for more than 2 minutes.'

      - alert: HighCPULoad
        expr: |
          100 * (1 - avg by (host) (rate(node_cpu_seconds_total{mode="idle",job="node"}[5m]))) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'CPU > 90% sustained on {{ $labels.host }}'
          description: '{{ $labels.host }} has averaged > 90% CPU for 10 minutes.'

      - alert: HighMemoryUsage
        expr: |
          100 * (1 - node_memory_MemAvailable_bytes{job="node"} / node_memory_MemTotal_bytes{job="node"}) > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Memory > 90% on {{ $labels.host }}'
          description: '{{ $labels.host }} has > 90% memory in use for 5 minutes.'

      - alert: DiskFillingFast
        expr: |
          predict_linear(node_filesystem_free_bytes{job="node",fstype!="tmpfs",fstype!="overlay"}[6h], 24*3600) < 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: 'Disk on {{ $labels.host }}:{{ $labels.mountpoint }} fills within 24h at current rate'
          description: 'Linear projection says {{ $labels.mountpoint }} on {{ $labels.host }} runs out of space in less than 24 hours.'

      - alert: DiskAlmostFull
        expr: |
          100 * (1 - node_filesystem_avail_bytes{job="node",fstype!="tmpfs",fstype!="overlay"} / node_filesystem_size_bytes{job="node",fstype!="tmpfs",fstype!="overlay"}) > 85
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: 'Disk > 85% on {{ $labels.host }}:{{ $labels.mountpoint }}'
          description: '{{ $labels.mountpoint }} on {{ $labels.host }} is more than 85% full.'

      - alert: ClockSkew
        expr: abs(node_timex_offset_seconds{job="node"}) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'Clock skew on {{ $labels.host }}'
          description: 'NTP offset on {{ $labels.host }} is more than 0.5 seconds off.'

      - alert: SystemdUnitFailed
        expr: node_systemd_unit_state{job="node",state="failed"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Failed systemd unit {{ $labels.name }} on {{ $labels.host }}'
          description: 'systemd unit {{ $labels.name }} on {{ $labels.host }} is in failed state.'
