# =============================================================================
# Loki single-binary config for the home lab
# =============================================================================
# Run mode: monolithic (all components in one process). Filesystem storage.
# Retention 14 days. No replication; this is the only Loki node.
# Mounted at /etc/loki/loki-config.yml inside the container.
# =============================================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# Schema config: TSDB index, filesystem object store. Single schema active
# from the day we deploy; bump `from` and add a new entry if we ever change
# storage layout, never edit an existing one.
schema_config:
  configs:
    - from: 2026-04-26
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
  filesystem:
    directory: /loki/chunks

# Limits: small lab, modest ingestion. Bump if Promtail starts dropping.
limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  retention_period: 336h     # 14 days
  max_query_parallelism: 32

# Compactor handles retention. Without it, retention_period is ignored.
compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  ring:
    kvstore:
      store: inmemory
  enable_api: true

analytics:
  reporting_enabled: false
