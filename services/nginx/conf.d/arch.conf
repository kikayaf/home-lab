# =============================================================================
# arch.lab.local - static site from structurizr-site-generatr
# =============================================================================
# Generated HTML lives at /usr/share/nginx/html/arch/ inside the nginx
# container, mounted from /srv/arch/home-lab/architecture/build/site/ on
# lab-gateway. Regenerate via the structurizr-site-generatr Docker image
# whenever workspace.dsl changes.
# =============================================================================

server {
    listen 80;
    server_name arch.lab.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name arch.lab.local;

    ssl_certificate     /etc/nginx/tls/lab.local.crt;
    ssl_certificate_key /etc/nginx/tls/lab.local.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/arch.access.log main;
    error_log  /var/log/nginx/arch.error.log;

    root  /usr/share/nginx/html/arch;
    index index.html;

    # Standard static-site fallback: try the exact file, then directory, else 404
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # Cache assets aggressively; they rev by filename when the DSL changes
    location ~* \.(svg|png|ico|css|js|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
}
