# =============================================================================
# prom.lab.local - Prometheus UI reverse proxy
# =============================================================================
# Prometheus runs on lab-platform-eng (192.168.100.208:9090). This vhost
# gives it a clean internal URL with wildcard *.lab.local TLS.
#
# Notes:
#   - No WebSocket needed; Prometheus UI is plain HTTP.
#   - No special body size; queries are GET parameters or small POSTs.
#   - Internal-only. No auth in front today.
# =============================================================================

upstream prometheus {
    server 192.168.100.208:9090;
}

server {
    listen 80;
    server_name prom.lab.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name prom.lab.local;

    ssl_certificate     /etc/nginx/tls/lab.local.crt;
    ssl_certificate_key /etc/nginx/tls/lab.local.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/prom.access.log main;
    error_log  /var/log/nginx/prom.error.log;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # PromQL queries can be slow; give them headroom.
    proxy_connect_timeout 30s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    location / {
        proxy_pass http://prometheus;
    }
}
