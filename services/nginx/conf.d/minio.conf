# =============================================================================
# minio.lab.local - MinIO web console
# =============================================================================
# Browser UI for administering MinIO: create buckets, users, policies, inspect
# objects. Runs on port 9001 on lab-datastore.
# =============================================================================

upstream minio_console {
    server 192.168.100.205:9001;
}

server {
    listen 80;
    server_name minio.lab.local;

    access_log /var/log/nginx/minio.access.log main;
    error_log  /var/log/nginx/minio.error.log;

    client_max_body_size 0;

    # MinIO console uses WebSockets for real-time bucket/user UI updates
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Long enough for big operations (bucket replication, policy changes)
    proxy_connect_timeout 300s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    proxy_buffering off;

    location / {
        proxy_pass http://minio_console;
    }
}
