# =============================================================================
# vault.lab.local - Vaultwarden reverse proxy
# =============================================================================
# Vaultwarden runs on lab-datastore (192.168.100.205:8222). This vhost gives
# it a clean internal URL. Public access (work PC, mobile) will eventually
# go through Cloudflare Tunnel + Access at vault.<domain>.com; not yet.
#
# Notes:
#   - WebSocket upgrade is essential: Bitwarden clients use WS for live sync.
#   - Large body size allows file attachments.
#   - Long timeouts for big attachment uploads and long-running WS sessions.
# =============================================================================

upstream vaultwarden {
    server 192.168.100.205:8222;
}

# HTTP -> HTTPS redirect (Vaultwarden strictly requires HTTPS on DOMAIN)
server {
    listen 80;
    server_name vault.lab.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name vault.lab.local;

    ssl_certificate     /etc/nginx/tls/lab.local.crt;
    ssl_certificate_key /etc/nginx/tls/lab.local.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/vault.access.log main;
    error_log  /var/log/nginx/vault.error.log;

    # File attachments can be up to 128 MB
    client_max_body_size 128M;

    # Modern Vaultwarden (1.25+) multiplexes WebSockets through the main HTTP
    # port, so we just need one proxy_pass with WS upgrade headers enabled.
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 300s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    location / {
        proxy_pass http://vaultwarden;
    }
}
