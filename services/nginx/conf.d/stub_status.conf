# =============================================================================
# stub_status.conf - nginx stub_status for nginx-prometheus-exporter
# =============================================================================
# Exposes /stub_status on lab-gateway for the nginx-prometheus-exporter to
# scrape. The exporter (Docker container on labnet) hits this endpoint via
# the lab IP, and Prometheus then scrapes the exporter on :9113.
#
# Hardened by binding only to localhost + the lab IP, with allow/deny rules
# so only known scrapers can read the connection counts.
# =============================================================================

server {
    # Listen on port 8090 inside the nginx container's namespace. The host
    # publishes this on 192.168.100.201:8090 via -p in the docker run command,
    # so external exposure is still scoped to the lab interface.
    listen 8090;
    server_name nginx-stub.lab.local;

    access_log off;
    error_log /var/log/nginx/stub_status.error.log;

    location /stub_status {
        stub_status on;

        # Only the nginx-prometheus-exporter container (on the same host's
        # bridge network) and lab-platform-eng (Prometheus host) need this.
        allow 127.0.0.1;
        allow 192.168.100.0/24;
        allow 172.16.0.0/12;       # Docker bridge networks
        deny all;
    }

    location / {
        return 404;
    }
}
