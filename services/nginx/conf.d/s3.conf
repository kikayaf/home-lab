# =============================================================================
# s3.lab.local - MinIO S3 API endpoint
# =============================================================================
# Apps point their S3 clients (AWS SDK, boto3, mc, etc.) at http://s3.lab.local.
# nginx forwards to MinIO on lab-datastore:9000.
#
# Configured for large uploads and streaming; S3 clients rely on chunked
# transfer encoding and can send multi-GB objects.
# =============================================================================

upstream minio_s3 {
    server 192.168.100.205:9000;
}

server {
    listen 80;
    server_name s3.lab.local;

    access_log /var/log/nginx/s3.access.log main;
    error_log  /var/log/nginx/s3.error.log;

    # Allow large file uploads (S3 objects can be huge)
    client_max_body_size   0;
    client_body_buffer_size 1m;

    # HTTP/1.1 required for keepalive and chunked transfer encoding
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Standard proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts generous enough for large object transfers
    proxy_connect_timeout 300s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    # Disable request/response buffering so streaming uploads don't stall
    proxy_buffering         off;
    proxy_request_buffering off;

    location / {
        proxy_pass http://minio_s3;
    }
}
