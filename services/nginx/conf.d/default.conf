# =============================================================================
# default.conf - catch-all vhost for unknown Host headers
# =============================================================================
# Matches any request that doesn't hit a more specific server_name below.
# Returns a clear 404 so it's obvious you landed on the proxy but nothing
# knows how to handle the hostname you used.
# =============================================================================

server {
    listen 80 default_server;
    server_name _;

    access_log /var/log/nginx/default.access.log main;
    error_log  /var/log/nginx/default.error.log;

    location / {
        default_type text/plain;
        return 404 "lab-gateway reverse proxy\n\nNo vhost is configured for '$host'.\nSee services/nginx/conf.d/ in the home-lab repo for configured services.\n";
    }
}
