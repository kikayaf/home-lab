# =============================================================================
# alerts.lab.local - Alertmanager UI reverse proxy
# =============================================================================
# Alertmanager runs on lab-platform-eng (192.168.100.208:9093) on labnet.
# This vhost gives it a clean internal URL with wildcard *.lab.local TLS.
# =============================================================================

upstream alertmanager {
    server 192.168.100.208:9093;
}

server {
    listen 80;
    server_name alerts.lab.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name alerts.lab.local;

    ssl_certificate     /etc/nginx/tls/lab.local.crt;
    ssl_certificate_key /etc/nginx/tls/lab.local.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/alerts.access.log main;
    error_log  /var/log/nginx/alerts.error.log;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 30s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    location / {
        proxy_pass http://alertmanager;
    }
}
