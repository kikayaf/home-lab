# =============================================================================
# ntfy.lab.local - ntfy reverse proxy
# =============================================================================
# ntfy runs on lab-platform-eng (192.168.100.208:8085) on labnet. This vhost
# gives it a clean internal URL with wildcard *.lab.local TLS.
#
# Notes:
#   - WebSocket upgrade is essential: ntfy uses WS for live subscriptions.
#   - Long read timeout: long-poll subscribers can hold connections open for
#     minutes; cap at 10m so leaks don't accumulate forever.
#   - X-Forwarded-* headers go through (server.yml has behind-proxy: true).
# =============================================================================

upstream ntfy {
    server 192.168.100.208:8085;
}

server {
    listen 80;
    server_name ntfy.lab.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name ntfy.lab.local;

    ssl_certificate     /etc/nginx/tls/lab.local.crt;
    ssl_certificate_key /etc/nginx/tls/lab.local.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/ntfy.access.log main;
    error_log  /var/log/nginx/ntfy.error.log;

    # Attachments up to 15 MB
    client_max_body_size 16M;

    # WebSocket / SSE for subscribers
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Long-poll subscribers can hold for a while
    proxy_connect_timeout 30s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;

    location / {
        proxy_pass http://ntfy;
        # Don't buffer SSE / WS streams
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
