# =============================================================================
# hello.lab.local - smoke-test vhost
# =============================================================================
# Proxies to the k3s `hello` Service (NodePort 30080 on every node).
# Backed by the `traefik/whoami` workload defined in
# kubernetes/hello/hello.yaml.
#
# Demonstrates the full request path: Mac -> tailnet -> CoreDNS wildcard
# -> nginx -> k3s NodePort -> pod -> response back.
# =============================================================================

upstream k3s_hello {
    server 192.168.100.202:30080 max_fails=2 fail_timeout=5s;
    server 192.168.100.203:30080 max_fails=2 fail_timeout=5s;
    server 192.168.100.204:30080 max_fails=2 fail_timeout=5s;
}

server {
    listen 80;
    server_name hello.lab.local;

    access_log /var/log/nginx/hello.access.log main;
    error_log  /var/log/nginx/hello.error.log;

    location / {
        proxy_pass http://k3s_hello;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
