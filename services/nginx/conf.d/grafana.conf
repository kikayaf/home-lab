# =============================================================================
# grafana.lab.local - Grafana reverse proxy
# =============================================================================
# Grafana runs on lab-platform-eng (192.168.100.208:3000). This vhost gives
# it a clean internal URL with wildcard *.lab.local TLS.
#
# Notes:
#   - WebSocket upgrade is required: Live tail (Loki), live dashboards, and
#     alert state updates use WS.
#   - GF_SERVER_ROOT_URL must be set to https://grafana.lab.local on the
#     Grafana side so OAuth callbacks and panel URLs are correct.
# =============================================================================

upstream grafana {
    server 192.168.100.208:3000;
}

server {
    listen 80;
    server_name grafana.lab.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name grafana.lab.local;

    ssl_certificate     /etc/nginx/tls/lab.local.crt;
    ssl_certificate_key /etc/nginx/tls/lab.local.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/grafana.access.log main;
    error_log  /var/log/nginx/grafana.error.log;

    # WS support for Live, alerts, and dashboard updates.
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 30s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    location / {
        proxy_pass http://grafana;
    }
}
