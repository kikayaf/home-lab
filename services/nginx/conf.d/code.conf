# =============================================================================
# code.lab.local - code-server reverse proxy
# =============================================================================
# code-server runs on lab-platform-eng (192.168.100.208:8080) as a Docker
# container. nginx here is the Host-header dispatcher for the clean URL
# inside the tailnet. External public access (work PC) is via Tailscale
# Funnel, configured separately on lab-gateway.
# =============================================================================

upstream code_server {
    server 192.168.100.208:8080;
}

server {
    listen 80;
    server_name code.lab.local;

    access_log /var/log/nginx/code.access.log main;
    error_log  /var/log/nginx/code.error.log;

    # code-server uses WebSockets for the terminal, file watcher, and
    # language server protocol streams. nginx must upgrade the connection
    # and pass through WebSocket headers.
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Standard proxy headers so code-server sees the real client
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Long timeouts so idle terminal/LSP connections don't get killed
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # code-server file uploads and paste buffers can be chunky
    client_max_body_size 100M;

    location / {
        proxy_pass http://code_server;
    }
}
