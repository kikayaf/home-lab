# =============================================================================
# Grafana provisioned data source: Loki
# =============================================================================
# Mounted at /etc/grafana/provisioning/datasources/loki.yml inside the
# container. Resolves loki:3100 via Docker DNS on labnet.
# =============================================================================

apiVersion: 1

datasources:
  - name: Loki
    uid: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      maxLines: 1000
      timeout: 60
