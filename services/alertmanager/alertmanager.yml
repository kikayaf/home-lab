# =============================================================================
# Alertmanager config for the home lab
# =============================================================================
# Mounted at /etc/alertmanager/alertmanager.yml inside the container.
# Reload in-place with `docker exec alertmanager kill -HUP 1` after editing.
#
# Initial routing: log target only. Every firing alert lands in the
# alertmanager log + Grafana's "Alerting" page. No Slack/email/webhook yet
# (we'll wire one in once we've tuned out flapping rules).
# =============================================================================

global:
  resolve_timeout: 5m

# Route tree: all alerts go to the default receiver. Add severity-specific
# routes here later if we want different paths for warning vs critical.
route:
  group_by: ['alertname', 'host']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: log

receivers:
  - name: log
    # No webhook, no email. The receiver is "void"; alerts still appear in
    # the Alertmanager UI, the Prometheus /alerts page, and Grafana > Alerting.
    # Future: add slack_configs / email_configs / webhook_configs here.

inhibit_rules:
  # If a host is down, suppress all the per-service alerts for that host.
  # No point in being told both "lab-datastore is down" and "postgres is down"
  # when postgres lives on lab-datastore.
  - source_matchers:
      - alertname="InstanceDown"
    target_matchers:
      - severity=~"warning|critical"
    equal: ['host']
