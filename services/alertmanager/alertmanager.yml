# =============================================================================
# Alertmanager config for the home lab
# =============================================================================
# Mounted at /etc/alertmanager/alertmanager.yml inside the container.
# Reload in-place with `docker exec alertmanager kill -HUP 1` after editing.
#
# Initial routing: log target only. Every firing alert lands in the
# alertmanager log + Grafana's "Alerting" page. No Slack/email/webhook yet
# (we'll wire one in once we've tuned out flapping rules).
# =============================================================================

global:
  resolve_timeout: 5m

# Route tree:
#   - critical alerts publish to ntfy immediately (no batching, max priority)
#   - warning alerts publish to ntfy with default priority and 5m batching
#   - the "log" receiver remains as a fallback / silence target
route:
  group_by: ['alertname', 'host']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: ntfy-warning
  routes:
    - matchers:
        - severity = "critical"
      receiver: ntfy-critical
      group_wait: 0s
      repeat_interval: 1h
      continue: false

receivers:
  - name: log
    # No webhook, no notification. Used to silence selected alerts (e.g.
    # ones we know are flaky) by routing them here.

  - name: ntfy-warning
    webhook_configs:
      - url: 'http://ntfy/lab-alerts?priority=default&tags=warning'
        send_resolved: true
        http_config:
          # ntfy doesn't expect Alertmanager's content-type; let it default
          follow_redirects: true

  - name: ntfy-critical
    webhook_configs:
      - url: 'http://ntfy/lab-alerts?priority=max&tags=rotating_light'
        send_resolved: true
        http_config:
          follow_redirects: true

inhibit_rules:
  # If a host is down, suppress all the per-service alerts for that host.
  # No point in being told both "lab-datastore is down" and "postgres is down"
  # when postgres lives on lab-datastore.
  - source_matchers:
      - alertname="InstanceDown"
    target_matchers:
      - severity=~"warning|critical"
    equal: ['host']
