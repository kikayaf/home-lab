# =============================================================================
# Redis 7 configuration - lab-datastore
# =============================================================================
# Non-secret settings only. The root password is injected at runtime via
# --requirepass on the docker run command line, never committed to git.
# =============================================================================

# --- Network -----------------------------------------------------------------
bind 0.0.0.0
port 6379
protected-mode yes

# --- Persistence -------------------------------------------------------------
# Data lives in the bind-mounted /data directory. AOF (append-only file) gives
# us crash-consistent recovery; RDB snapshots give a compact point-in-time
# backup.
dir /data
appendonly yes
appendfsync everysec

# RDB snapshots: save if at least N keys changed within M seconds
save 900 1
save 300 10
save 60  10000

# --- Memory ------------------------------------------------------------------
# 256 MB is plenty for cache + session + small queue workloads on a lab.
# Bump if an app needs more (and the VM has the headroom).
maxmemory 256mb
maxmemory-policy allkeys-lru

# --- Logging -----------------------------------------------------------------
loglevel notice
